<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Together Brewing Tomorrow</title>
  </head>
  <body>
    <div id="app">
      <section id="view-1" class="view is-active">
        <div class="view-frame">
          <!-- Layer stack, bottom to top: sky (full-frame cover, also fills
               any letterbox gap left by the contain-fit layers above it) →
               flow lines → hop flower → text/logo overlay. -->
          <img class="view-sky" src="/asset/backgroundsky.webp" alt="" />
          <img class="view-line" src="/asset/liquid_lineview1.webp" alt="" />
          <!-- Short glowing streaks travel inward along the 4 flow curves;
               sized/positioned by main.js to match the line/flower layers. -->
          <canvas class="view-particles" aria-hidden="true"></canvas>
          <!-- Wrapper carries the entrance/tap-pulse transforms; the img
               keeps its own breathing animation — same property (transform)
               can't run two animations on one element. -->
          <div class="view-flower-wrap">
            <!-- Glow lives on its own copy of the image with a STATIC filter
                 chain (rasterized once); only its opacity breathes. Animating
                 the drop-shadow chain itself forced a GPU re-raster of 5
                 shadows every frame — the main mobile lag source. -->
            <img class="view-flower-glow" src="/asset/hoabeerview1.webp" alt="" aria-hidden="true" />
            <img class="view-flower" src="/asset/hoabeerview1.webp" alt="" />
          </div>
          <img class="view-overlay" src="/asset/view1text_icon.png" alt="" />
        </div>
      </section>

      <section id="view-2" class="view">
        <div class="view-frame">
          <img class="view-sky" src="/asset/backgroundsky.webp" alt="" />
          <!-- Same flow-line artwork as view 1 (design decision): keeps the
               colored streams identical across the transition, and shares
               one decoded image between the views. -->
          <img class="view-line" src="/asset/liquid_lineview1.webp" alt="" />
          <canvas class="view-particles" aria-hidden="true"></canvas>
          <div class="view-flower-wrap">
            <img class="view-flower-glow" src="/asset/hoabiaview2.webp" alt="" aria-hidden="true" />
            <img class="view-flower" src="/asset/hoabiaview2.webp" alt="" />
          </div>
          <img class="view-overlay" src="/asset/view2text.png" alt="" />
        </div>
      </section>

      <!-- Tap burst lives OUTSIDE both view stacks (positioned over the
           flower by main.js): if it animated inside the fading view-1 group,
           the group's render-to-texture would be invalidated every frame of
           the cross-fade — the stutter right as view 2 appeared. -->
      <div class="view-burst" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Together Brewing Tomorrow</title>
  </head>
  <body>
    <div id="app">
      <section id="view-1" class="view is-active">
        <div class="view-frame">
          <!-- Blurred cover layer fills the letterbox gaps with the artwork's
               own sky so the bars blend in instead of showing a flat color. -->
          <div class="view-bg-fill view-bg-fill--1"></div>
          <picture>
            <source srcset="/asset/view1.webp" type="image/webp" />
            <img class="view-bg" src="/asset/view1.jpg" alt="" />
          </picture>
          <img class="view-overlay" src="/asset/view1text_icon.png" alt="" />
        </div>
      </section>

      <section id="view-2" class="view">
        <div class="view-frame">
          <div class="view-bg-fill view-bg-fill--2"></div>
          <picture>
            <source srcset="/asset/view2.webp" type="image/webp" />
            <img class="view-bg" src="/asset/view2.jpg" alt="" />
          </picture>
          <img class="view-overlay" src="/asset/view2text.png" alt="" />
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
